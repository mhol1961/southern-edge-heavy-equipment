# docker-compose.yml
#
# HOW TO USE (on your own machine):
#   docker compose up --build      <- builds image + starts app
#   docker compose up -d           <- same but runs in background
#   docker compose down            <- stops everything
#   docker compose logs -f         <- watch live logs
#
# Then visit: http://localhost:3000
#
# NOTE: You do NOT need docker-compose for Railway.
# Railway reads the Dockerfile directly from your GitHub repo.
# This file is for local testing only.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

